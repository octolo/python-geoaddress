<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Locations - REST Framework</title>
    <link rel="stylesheet" href="/static/css/geoaddress_suggest.css">
    <link rel="stylesheet" href="/static/css/location-rest.css">
    <link rel="stylesheet" href="/static/css/location-base.css">
</head>
<body>
    <div class="location-list-container">
        <div class="nav-links">
            <a href="/locations/django/">Django Native</a>
            <a href="/locations/rest/">REST Framework</a>
        </div>

        <div class="api-info">
            <strong>REST Framework API:</strong> This interface uses pure JavaScript to interact with the REST API at <code>/api/locations/</code>
        </div>

        <div class="page-header">
            <h1>Locations <span class="version-badge">REST Framework</span></h1>
            <button onclick="showCreateForm()" class="btn">Add New Location</button>
        </div>

        <div id="messages"></div>
        <div id="locations-container">
            <div class="loading">Loading locations...</div>
        </div>
    </div>

    <script>
        const API_BASE_URL = '/api/locations/';
        const CSRF_TOKEN = getCookie('csrftoken');

        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        function showMessage(message, type) {
            const messagesDiv = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = type === 'error' ? 'error-message' : 'success-message';
            messageDiv.textContent = message;
            messagesDiv.appendChild(messageDiv);
            setTimeout(() => messageDiv.remove(), 5000);
        }

        async function loadLocations() {
            const container = document.getElementById('locations-container');
            try {
                const response = await fetch(API_BASE_URL);
                if (!response.ok) {
                    throw new Error('Failed to load locations');
                }
                const locations = await response.json();
                renderLocations(locations);
            } catch (error) {
                container.innerHTML = `<div class="error-message">Error loading locations: ${error.message}</div>`;
            }
        }

        function renderLocations(locations) {
            const container = document.getElementById('locations-container');
            if (locations.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <p>No locations found.</p>
                        <button onclick="showCreateForm()" class="btn">Create your first location</button>
                    </div>
                `;
                return;
            }

            container.innerHTML = locations.map(location => `
                <div class="location-card" data-id="${location.id}">
                    <div class="location-card-header">
                        <div>
                            <div class="location-name">${escapeHtml(location.name)}</div>
                            ${location.address_display ? `<div class="location-address">${escapeHtml(location.address_display)}</div>` : ''}
                        </div>
                        <div class="location-actions">
                            <button onclick="editLocation(${location.id})" class="btn">Edit</button>
                            <button onclick="deleteLocation(${location.id})" class="btn btn-danger">Delete</button>
                        </div>
                    </div>
                    <div class="location-meta">
                        Created: ${formatDate(location.created_at)}
                        ${location.updated_at !== location.created_at ? ` | Updated: ${formatDate(location.updated_at)}` : ''}
                    </div>
                </div>
            `).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatDate(dateString) {
            if (!dateString) return '';
            const date = new Date(dateString);
            return date.toLocaleDateString('fr-FR') + ' ' + date.toLocaleTimeString('fr-FR', {hour: '2-digit', minute: '2-digit'});
        }

        function showCreateForm() {
            window.location.href = '/locations/rest/create/';
        }

        function editLocation(id) {
            window.location.href = `/locations/rest/${id}/edit/`;
        }

        async function deleteLocation(id) {
            if (!confirm('Are you sure you want to delete this location?')) {
                return;
            }
            try {
                const response = await fetch(`${API_BASE_URL}${id}/`, {
                    method: 'DELETE',
                    headers: {
                        'X-CSRFToken': CSRF_TOKEN
                    }
                });
                if (!response.ok) {
                    throw new Error('Failed to delete location');
                }
                showMessage('Location deleted successfully!', 'success');
                loadLocations();
            } catch (error) {
                showMessage(`Error deleting location: ${error.message}`, 'error');
            }
        }

        loadLocations();
    </script>
</body>
</html>
